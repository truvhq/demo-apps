<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truv Quickstart — Follow-up</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="https://cdn.truv.com/bridge.js"></script>
  <style>
    /* White background, full-width layout */
    :root { --bg: #ffffff; }
    .app-panel { padding: 40px 32px; }
    .screen-container { max-width: 640px; }

    /* Task cards */
    .task-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; background: var(--bg-white); }
    .task-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .task-icon.employment { background: #dbeafe; }
    .task-icon.income { background: #dcfce7; }
    .task-icon.assets { background: #fef3c7; }
    .task-info { flex: 1; }
    .task-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .task-desc { font-size: 12px; color: var(--text-secondary); }
    .task-status { flex-shrink: 0; }

    /* Bridge embed — full width, fills panel */
    .app-panel.bridge-mode { padding: 0; }
    .bridge-screen { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .bridge-topbar { padding: 14px 24px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .bridge-topbar .back-link { margin: 0; font-size: 13px; white-space: nowrap; }
    .bridge-topbar .divider { width: 1px; height: 20px; background: var(--border); }
    .bridge-topbar h2 { font-size: 15px; font-weight: 600; margin: 0; white-space: nowrap; }
    .bridge-topbar .creds { margin: 0; margin-left: auto; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .bridge-topbar .creds code { background: var(--bg-input); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .bridge-wrapper { flex: 1; overflow: hidden; position: relative; background: #fff; zoom: 0.85; }
    .bridge-wrapper iframe { width: 100% !important; height: 100% !important; border: none; }
    .bridge-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"></div>
    <div class="header-title">Truv Quickstart</div>
    <div class="header-badge">Follow-up</div>
  </div>
</div>

<div class="main-layout">
  <div class="app-panel" id="appPanel"></div>
  <div id="apiPanel" class="api-panel"></div>
</div>

<script src="/shared/panel.js"></script>
<script src="/shared/results.js"></script>
<script>
// --- Guide steps (developer-authored static HTML) ---
var STEPS = [
  {
    title: 'Select a task',
    guide: '<p>Choose a verification task from the list. Each task creates a separate order via your backend:</p>'
      + '<pre>POST /v1/orders/\n{\n  "products": ["income"],\n  "template_id": "..."\n}</pre>'
      + '<p>The response contains a <code>bridge_token</code> to open Bridge and an order <code>id</code> for tracking.</p>'
      + '<h5>Follow-up flow</h5><ul>'
      + '<li>Each task maps to a different <code>product_type</code> (employment, income, assets)</li>'
      + '<li>Tasks are independent — complete them in any order</li>'
      + '<li>The Bridge widget handles the full verification inline</li></ul>'
      + '<p><a href="https://docs.truv.com/reference/create-an-order" target="_blank">API Reference \u2192</a></p>',
  },
  {
    title: 'Bridge verification',
    guide: '<p>The Bridge widget is initialized with:</p>'
      + '<pre>TruvBridge.init({\n  bridgeToken: "...",\n  isOrder: true,\n  position: { type: "inline", container: el }\n})</pre>'
      + '<p>Bridge fires events as the user progresses:</p><ul>'
      + '<li><code>onLoad</code> — widget ready</li>'
      + '<li><code>onEvent(LOAD, OPEN, LINK_CREATED, ...)</code> — user actions</li>'
      + '<li><code>onSuccess</code> — single task completed, advance to webhooks</li>'
      + '<li><code>onClose</code> — user dismissed the widget</li></ul>'
      + '<p>Sandbox credentials: <code>goodlogin</code> / <code>goodpassword</code></p>'
      + '<p><a href="https://docs.truv.com/docs/bridge-overview" target="_blank">Bridge Docs \u2192</a></p>',
  },
  {
    title: 'Webhook processing',
    guide: '<p>Truv sends webhooks to your registered URL as the verification progresses. Events arrive in this order:</p><ol>'
      + '<li><code>task-status-updated</code> — login \u2192 parse \u2192 done</li>'
      + '<li><code>link-connected</code> — payroll link established</li>'
      + '<li><code>profile-created</code>, <code>employment-created</code>, <code>income-created</code></li>'
      + '<li><code>order-status-updated</code> (status: completed) — all done</li></ol>'
      + '<p>All webhooks include <code>user_id</code> for matching. Verify the <code>X-Webhook-Sign</code> header with HMAC-SHA256.</p>'
      + '<pre>const sig = crypto\n  .createHmac(\'sha256\', API_SECRET)\n  .update(rawBody)\n  .digest(\'hex\');</pre>'
      + '<p><a href="https://docs.truv.com/docs/webhooks" target="_blank">Webhooks Docs \u2192</a></p>',
  },
  {
    title: 'Retrieve results',
    guide: '<p>Once the task completes, fetch the full results:</p>'
      + '<pre>GET /v1/orders/{order_id}/</pre>'
      + '<p>The response includes nested <code>employers[]</code> with:</p><ul>'
      + '<li><strong>Profile</strong> — name, SSN, DOB, address</li>'
      + '<li><strong>Employment</strong> — title, start date, income</li>'
      + '<li><strong>Pay Statements</strong> — gross/net pay, earnings, deductions</li>'
      + '<li><strong>Bank Accounts</strong> — direct deposit routing info</li></ul>'
      + '<p>After reviewing results, return to the task list to complete remaining verifications.</p>'
      + '<p><a href="https://docs.truv.com/reference/get-an-order" target="_blank">API Reference \u2192</a></p>',
  },
];

// --- Panel ---
var panel = new QuickstartPanel({
  tabs: ['guide', 'api', 'bridge', 'webhooks'],
  steps: STEPS,
  onWebhook: function(wh) {
    if (state.screen === 'waiting') updateWaitingFeed();
  }
});

var TASKS = [
  { id: 'documents', name: 'Upload Documents', desc: 'Verify employment documents', product: 'employment', icon: '\uD83D\uDCC4', iconClass: 'employment' },
  { id: 'income', name: 'Verify Income', desc: 'Confirm income and pay history', product: 'income', icon: '\uD83D\uDCB0', iconClass: 'income' },
  { id: 'assets', name: 'Verify Assets', desc: 'Confirm asset accounts', product: 'assets', icon: '\uD83C\uDFE6', iconClass: 'assets' },
  { id: 'identity', name: 'Verify Identity', desc: 'Confirm identity via employer records', product: 'employment', icon: '\uD83D\uDD10', iconClass: 'employment' },
];

var state = {
  screen: 'tasks',
  activeTask: null,
  taskStatus: {},
  orderId: null,
  userId: null,
  bridgeToken: null,
  orderData: null,
};

// Initialize all tasks as pending
TASKS.forEach(function (t) { state.taskStatus[t.id] = 'pending'; });

var bridgeInstance = null;
var waitingStartedAt = null;
var advancePending = false;
var WAITING_MIN_MS = 10000;

function render() {
  var appPanel = document.getElementById('appPanel');
  appPanel.replaceChildren();

  if (state.screen === 'bridge') {
    appPanel.className = 'app-panel bridge-mode';
    appPanel.appendChild(buildBridgeScreen());
  } else if (state.screen === 'waiting') {
    appPanel.className = 'app-panel';
    var sc = el('div', { className: 'screen-container' });
    sc.appendChild(buildWaitingScreen());
    appPanel.appendChild(sc);
  } else if (state.screen === 'results') {
    appPanel.className = 'app-panel';
    var sc = el('div', { className: 'screen-container' });
    sc.appendChild(buildResultsScreen());
    appPanel.appendChild(sc);
  } else {
    appPanel.className = 'app-panel';
    var sc = el('div', { className: 'screen-container' });
    sc.appendChild(buildTaskList());
    appPanel.appendChild(sc);
  }
}

// --- Task List ---
function buildTaskList() {
  var root = el('div');
  root.appendChild(el('h2', null, 'Complete Your Application'));
  root.appendChild(el('p', { className: 'desc' }, 'You have pending tasks to finish your application. Complete each verification step below.'));

  TASKS.forEach(function (task) {
    var status = state.taskStatus[task.id];
    var isCompleted = status === 'completed';

    var taskCard = el('div', { className: 'task-card' });
    taskCard.appendChild(el('div', { className: 'task-icon ' + task.iconClass }, task.icon));
    taskCard.appendChild(el('div', { className: 'task-info' }, [
      el('div', { className: 'task-name' }, task.name),
      el('div', { className: 'task-desc' }, task.desc),
    ]));

    if (isCompleted) {
      taskCard.appendChild(el('span', { className: 'badge badge-success' }, 'Completed'));
    } else {
      taskCard.appendChild(el('button', { className: 'btn btn-primary btn-sm', onclick: function () { startTask(task); } }, 'Start'));
    }

    root.appendChild(taskCard);
  });

  return root;
}

async function startTask(task) {
  state.activeTask = task;

  try {
    var resp = await fetch(API_BASE + '/api/orders', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_type: task.product }),
    });
    var data = await resp.json();
    if (!resp.ok) { alert('Error: ' + (data.error || 'Unknown')); return; }

    state.orderId = data.order_id;
    state.userId = data.user_id;
    state.bridgeToken = data.bridge_token;
    state.orderData = null;
    panel.connectSSE(state.orderId);
    await panel.fetchLogs(state.orderId);
    state.screen = 'bridge';
    panel.setStep(1);
    render();
  } catch (e) { console.error(e); }
}

// --- Bridge ---
function buildBridgeScreen() {
  var task = state.activeTask;
  var screen = el('div', { className: 'bridge-screen' });

  var topbar = el('div', { className: 'bridge-topbar' });
  topbar.appendChild(el('div', { className: 'back-link', onclick: returnToTasks }, [
    el('span', null, '\u2190'), el('span', null, 'Back to tasks'),
  ]));
  screen.appendChild(topbar);

  var wrapper = el('div', { className: 'bridge-wrapper', id: 'bridgeContainer' });
  screen.appendChild(wrapper);

  setTimeout(initBridge, 100);
  return screen;
}

function initBridge() {
  if (!state.bridgeToken) return;
  bridgeInstance = TruvBridge.init({
    bridgeToken: state.bridgeToken,
    isOrder: true,
    position: { type: 'inline', container: document.getElementById('bridgeContainer') },
    onLoad: function () {
      panel.addBridgeEvent('onLoad', null);
    },
    onEvent: function (eventType, payload, source) {
      panel.addBridgeEvent('onEvent', { eventType: eventType, source: source });
    },
    onSuccess: function () {
      panel.addBridgeEvent('onSuccess', null);
      state.taskStatus[state.activeTask.id] = 'completed';
      setTimeout(async function() {
        await panel.fetchLogs(state.orderId);
        goWaiting();
      }, 1500);
    },
    onClose: function () { panel.addBridgeEvent('onClose', null); },
  });
  if (bridgeInstance) bridgeInstance.open();
}

// --- Waiting screen ---
function goWaiting() {
  bridgeInstance = null;
  state.screen = 'waiting';
  waitingStartedAt = Date.now();
  advancePending = false;
  panel.setStep(2);
  render();
  updateWaitingFeed();
}

function buildWaitingScreen() {
  var root = el('div', { className: 'waiting-screen' });
  var ringWrap = document.createElement('div');
  ringWrap.style.cssText = 'width:72px;height:72px;margin-bottom:28px;';
  var ring = document.createElement('div');
  ring.className = 'waiting-ring';
  ring.style.cssText = 'width:72px;height:72px;';
  ringWrap.appendChild(ring);
  root.appendChild(ringWrap);

  root.appendChild(el('h2', { style: 'margin-bottom:8px;' }, 'Waiting for webhooks'));
  root.appendChild(el('p', { style: 'font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:400px;margin-bottom:36px;' },
    'Truv sends webhook events as the verification progresses. Watch them arrive in real time.'));

  var feed = document.createElement('div');
  feed.id = 'webhookFeed';
  feed.style.cssText = 'text-align:left;width:100%;max-width:420px;';
  root.appendChild(feed);
  return root;
}

function updateWaitingFeed() {
  if (state.screen !== 'waiting') return;
  var feed = document.getElementById('webhookFeed');
  if (!feed) return;

  if (panel.webhooks.length === 0) {
    feed.textContent = 'No webhooks received yet...';
    feed.style.textAlign = 'center';
    feed.style.fontSize = '13px';
    feed.style.color = 'var(--text-muted)';
  } else {
    feed.style.textAlign = 'left';
    feed.style.fontSize = '';
    feed.style.color = '';
    feed.textContent = '';
    var reversed = panel.webhooks.slice().reverse();
    for (var i = 0; i < reversed.length; i++) {
      var w = reversed[i];
      var payload = typeof w.payload === 'string' ? JSON.parse(w.payload) : (w.payload || {});
      var eventType = payload.event_type || w.event_type || 'unknown';
      var status = payload.status || w.status || '';
      var ts = payload.event_created_at || payload.updated_at || w.received_at || '';
      var timeStr = ts ? new Date(ts).toLocaleTimeString() : '';
      var dotColor = status === 'completed' || status === 'done' ? 'green' : status === 'pending' ? 'yellow' : 'blue';

      var pill = document.createElement('div');
      pill.className = 'webhook-pill';
      var dot = document.createElement('div');
      dot.className = 'wp-dot ' + dotColor;
      pill.appendChild(dot);
      var text = document.createElement('span');
      text.className = 'wp-text';
      text.textContent = eventType.replace(/-/g, ' ');
      pill.appendChild(text);
      var time = document.createElement('span');
      time.className = 'wp-time';
      time.textContent = timeStr;
      pill.appendChild(time);
      feed.appendChild(pill);
    }
  }

  // Auto-advance once order is completed (with minimum display time)
  if (advancePending) return;
  var elapsed = Date.now() - waitingStartedAt;
  var isCompleted = panel.webhooks.some(function(w) {
    var p = typeof w.payload === 'string' ? JSON.parse(w.payload) : (w.payload || {});
    return p.event_type === 'order-status-updated' && p.status === 'completed';
  });
  if (isCompleted) {
    advancePending = true;
    var delay = Math.max(1000, WAITING_MIN_MS - elapsed + 1000);
    setTimeout(function() { goResults(); }, delay);
  }
}

// --- Results screen ---
function goResults() {
  waitingStartedAt = null;
  advancePending = false;
  state.screen = 'results';
  panel.setStep(3);

  if (state.orderData) {
    render();
  } else {
    render();
    fetchOrderData();
  }
}

async function fetchOrderData() {
  if (!state.orderId) return;
  try {
    var resp = await fetch(API_BASE + '/api/orders/' + encodeURIComponent(state.orderId));
    state.orderData = await resp.json();
    await panel.fetchLogs(state.orderId);
    render();
  } catch (e) { console.error(e); }
}

function buildResultsScreen() {
  var root = el('div');

  if (!state.orderData) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'text-align:center;padding:60px;';
    var ring = document.createElement('div');
    ring.className = 'waiting-ring';
    ring.style.cssText = 'width:40px;height:40px;margin:0 auto 12px;';
    wrap.appendChild(ring);
    root.appendChild(wrap);
    return root;
  }

  var data = state.orderData;
  var raw = data.raw_response || {};
  var task = state.activeTask;

  root.appendChild(el('h2', null, 'Verification Results'));
  root.appendChild(el('p', { style: 'font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:28px;' },
    (task ? task.name : 'Task') + ' \u2022 Order ' + (data.truv_order_id || '') + ' \u2022 ' + (data.status || '')));

  renderOrderResults(root, data);

  // Actions
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);';
  var backBtn = document.createElement('button');
  backBtn.className = 'btn btn-primary';
  backBtn.textContent = 'Back to Tasks';
  backBtn.onclick = returnToTasks;
  actions.appendChild(backBtn);
  root.appendChild(actions);

  return root;
}

function returnToTasks() {
  bridgeInstance = null;
  advancePending = false;
  waitingStartedAt = null;
  state.screen = 'tasks';
  state.activeTask = null;
  state.orderId = null;
  state.userId = null;
  state.bridgeToken = null;
  state.orderData = null;
  panel.setStep(0);
  render();
}

// --- Init ---
panel.connectGlobalSSE(function(wh) {
  var payload = typeof wh.payload === 'string' ? JSON.parse(wh.payload) : (wh.payload || {});
  if (state.userId && payload.user_id && payload.user_id !== state.userId) return false;
  return true;
});
render();
</script>
</body>
</html>
