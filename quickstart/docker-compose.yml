version: "2.4"
services:
  python:
    build:
      context: .
      dockerfile: ./quickstarts/python/Dockerfile
    env_file:
      - .env
    ports:
      - "5001:5001"
  ruby:
    build:
      context: .
      dockerfile: ./quickstarts/ruby/Dockerfile
    env_file:
      - .env
    ports:
      - "5002:5002"
  golang:
    build:
      context: .
      dockerfile: ./quickstarts/golang/Dockerfile
    env_file:
      - .env
    ports:
      - "5003:5003"
  node:
    build:
      context: .
      dockerfile: ./quickstarts/node/Dockerfile
    env_file:
      - .env
    ports:
      - "5004:5004"
  csharp:
    build:
      context: .
      dockerfile: ./quickstarts/c-sharp/Dockerfile
    env_file:
      - .env
    ports:
      - "5005:80"
