<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truv Quickstart — Application</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/shared/styles.css" />
  <script src="https://cdn.truv.com/bridge.js"></script>
  <style>
    /* Override shared variables to match original Application design */
    :root {
      --primary: #1a56db;
      --primary-hover: #1648b8;
      --primary-light: #eff6ff;
      --bg: #ffffff;
      --bg-white: #ffffff;
      --bg-input: #ffffff;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --success: #059669;
      --success-bg: #ecfdf5;
    }

    /* Layout */
    .app-panel { padding: 40px 32px; }
    .app-panel.no-pad { padding: 0; }
    .app-content { width: 100%; max-width: 520px; transition: max-width 0.2s; height: 100%; margin: 0 auto; }
    .app-content.full-width { max-width: 100%; }

    /* Form */
    .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
    .form-row-2 { grid-template-columns: 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label, label.form-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 0; }
    .form-group input, input.form-input { padding: 10px 14px; background: #fff; font-family: inherit; }
    .form-group input:focus, input.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    input.form-input::placeholder { color: var(--text-muted); }

    /* Checkbox */
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 24px 0; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    .checkbox-row label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }
    .checkbox-row label a { color: var(--primary); text-decoration: underline; }

    /* Buttons */
    .btn { padding: 12px 24px; font-weight: 600; font-family: inherit; }
    .btn-primary { width: 100%; }
    .btn-primary:disabled { opacity: 0.4; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: transparent; }

    /* Bridge embed */
    .bridge-wrapper { width: 100%; height: 100%; border: none; border-radius: 0; overflow: hidden; position: relative; background: #fff; zoom: 0.85; }
    .bridge-wrapper iframe { width: 100% !important; height: 100% !important; border: none; }

    /* Headings */
    h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }

    /* Tunnel info */
    .tunnel-info { background: #eff6ff; border: 1px solid #bfdbfe; }
    .tunnel-info span { color: #1e40af; font-weight: 600; }
    .tunnel-info a { color: #2563eb; }

    /* Bridge back link */
    .bridge-back { position: absolute; top: 12px; left: 16px; z-index: 10; font-size: 13px; font-weight: 500; color: var(--primary); cursor: pointer; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
    .bridge-back:hover { background: var(--primary-light); }

    /* Small spinner for buttons */
    .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"></div>
    <div class="header-title">Truv Quickstart</div>
    <div class="header-badge">Application</div>
  </div>
</div>

<div class="main-layout">
  <div class="app-panel" id="appPanel">
    <div class="app-content" id="appContent">

      <!-- Step 0: Form -->
      <div id="stepForm">
        <h2>Tell us about yourself</h2>
        <p class="subtitle">Enter applicant details to create a verification order. The backend sends these to the Truv Orders API.</p>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">First name</label>
            <input class="form-input" id="firstName" placeholder="Joe">
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input class="form-input" id="lastName" placeholder="Doe">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input class="form-input" id="email" type="email" placeholder="joe@example.com">
          </div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Phone number</label>
            <input class="form-input" id="phone" type="tel" placeholder="123456789">
          </div>
          <div class="form-group">
            <label class="form-label">SSN (last 4)</label>
            <input class="form-input" id="ssn" placeholder="6789">
          </div>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="agree" checked>
          <label for="agree">I agree to the <a href="#">Acme Terms of Service</a></label>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()" style="width:100%">Continue</button>
      </div>

      <!-- Step 1: Bridge -->
      <div id="stepBridge" class="hidden" style="width:100%;height:100%;position:relative;">
        <a class="bridge-back" onclick="backToForm()">&larr; Back</a>
        <div class="bridge-wrapper" id="bridgeContainer"></div>
      </div>

      <!-- Step 2: Waiting -->
      <div id="stepWaiting" class="hidden waiting-screen">
        <div style="width:72px;height:72px;margin-bottom:28px;">
          <div class="waiting-ring" style="width:72px;height:72px;"></div>
        </div>
        <h2 style="margin-bottom:8px;">Waiting for webhooks</h2>
        <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:400px;margin-bottom:36px;">Truv sends webhook events as the verification progresses. Watch them arrive in real time.</p>
        <div id="webhookFeed" style="text-align:left;width:100%;max-width:420px;"></div>
      </div>

      <!-- Step 3: Results -->
      <div id="stepResults" class="hidden"></div>

    </div>
  </div>

  <div id="apiPanel" class="api-panel"></div>
</div>

<script src="/shared/panel.js"></script>
<script src="/shared/results.js"></script>
<script>
// --- Guide steps (developer-authored static HTML) ---
var STEPS = [
  {
    title: 'Collect applicant info',
    guide: '<p>The form collects applicant PII and sends it to your backend. The server calls:</p>'
      + '<pre>POST /v1/orders/\n{\n  "first_name": "...",\n  "last_name": "...",\n  "products": ["income"],\n  "employers": [{ "company_name": "Home Depot" }]\n}</pre>'
      + '<p>The response contains a <code>bridge_token</code> used to initialize the Bridge widget, and an order <code>id</code> for polling results.</p>'
      + '<h5>Key fields</h5><ul>'
      + '<li><code>bridge_token</code> — single-use token to open Bridge</li>'
      + '<li><code>user_id</code> — identifies the user across webhooks</li>'
      + '<li><code>share_url</code> — shareable link for the applicant</li>'
      + '<li><code>template_id</code> — optional, for branded experience</li></ul>'
      + '<p><a href="https://docs.truv.com/reference/create-an-order" target="_blank">API Reference \u2192</a></p>',
  },
  {
    title: 'Bridge verification',
    guide: '<p>The Bridge widget is initialized with:</p>'
      + '<pre>TruvBridge.init({\n  bridgeToken: "...",\n  isOrder: true,\n  position: { type: "inline", container: el }\n})</pre>'
      + '<p>Bridge fires events as the user progresses:</p><ul>'
      + '<li><code>onLoad</code> — widget ready</li>'
      + '<li><code>onEvent(LOAD, OPEN, LINK_CREATED, ...)</code> — user actions</li>'
      + '<li><code>onEvent(COMPLETED, source: "order")</code> — verification done</li>'
      + '<li><code>onSuccess</code> / <code>onClose</code> — final callbacks</li></ul>'
      + '<p>Sandbox credentials: <code>goodlogin</code> / <code>goodpassword</code></p>'
      + '<p><a href="https://docs.truv.com/docs/bridge-overview" target="_blank">Bridge Docs \u2192</a></p>',
  },
  {
    title: 'Webhook processing',
    guide: '<p>Truv sends webhooks to your registered URL as the verification progresses. Events arrive in this order:</p><ol>'
      + '<li><code>order-created</code> — order is pending</li>'
      + '<li><code>task-status-updated</code> — login \u2192 parse \u2192 full_parse \u2192 done</li>'
      + '<li><code>link-connected</code> — payroll link established</li>'
      + '<li><code>profile-created</code>, <code>employment-created</code>, <code>statements-created</code>, <code>bank-accounts-created</code></li>'
      + '<li><code>order-status-updated</code> (status: completed) — all done</li></ol>'
      + '<p>All webhooks include <code>user_id</code> for matching. Verify the <code>X-Webhook-Sign</code> header with HMAC-SHA256.</p>'
      + '<pre>const sig = crypto\n  .createHmac(\'sha256\', API_SECRET)\n  .update(rawBody)\n  .digest(\'hex\');</pre>'
      + '<p><a href="https://docs.truv.com/docs/webhooks" target="_blank">Webhooks Docs \u2192</a></p>',
  },
  {
    title: 'Retrieve results',
    guide: '<p>Once the order is completed, fetch the full results:</p>'
      + '<pre>GET /v1/orders/{order_id}/</pre>'
      + '<p>The response includes nested <code>employers[]</code> with:</p><ul>'
      + '<li><strong>Profile</strong> — name, SSN, DOB, address</li>'
      + '<li><strong>Employment</strong> — title, start date, income, manager</li>'
      + '<li><strong>Pay Statements</strong> — gross/net pay, earnings, deductions per period</li>'
      + '<li><strong>W-2 Forms</strong> — annual wages and tax withholdings</li>'
      + '<li><strong>Bank Accounts</strong> — direct deposit routing info</li>'
      + '<li><strong>Annual Income Summary</strong> — aggregated by year</li></ul>'
      + '<p>You can also call <code>POST /v1/orders/{id}/refresh/</code> to re-pull data from the payroll provider.</p>'
      + '<p><a href="https://docs.truv.com/reference/get-an-order" target="_blank">API Reference \u2192</a></p>',
  },
];

// --- Panel ---
var panel = new QuickstartPanel({
  tabs: ['guide', 'api', 'bridge', 'webhooks'],
  steps: STEPS,
  onWebhook: function(wh) {
    if (state.step === 2) updateWaitingFeed();
  }
});

// --- State ---
var state = {
  step: 0, orderId: null, truvOrderId: null, userId: null,
  bridgeToken: null, productType: 'income', orderData: null
};

// --- Step switching ---
var screens = ['stepForm', 'stepBridge', 'stepWaiting', 'stepResults'];

function goStep(n) {
  state.step = n;
  panel.setStep(n);

  var appPanel = document.getElementById('appPanel');
  var appContent = document.getElementById('appContent');
  appPanel.className = n === 1 ? 'app-panel no-pad' : 'app-panel';
  appContent.className = n === 0 ? 'app-content' : 'app-content full-width';

  for (var i = 0; i < screens.length; i++) {
    var scr = document.getElementById(screens[i]);
    if (i === n) scr.classList.remove('hidden');
    else scr.classList.add('hidden');
  }

  if (n === 1) setTimeout(initBridge, 100);
  if (n === 2) { waitingStartedAt = Date.now(); updateWaitingFeed(); }
  if (n === 3) {
    if (state.orderData) { renderResults(); }
    else {
      var c = document.getElementById('stepResults');
      c.textContent = '';
      var w = document.createElement('div');
      w.style.cssText = 'text-align:center;padding:60px;';
      var r = document.createElement('div');
      r.className = 'waiting-ring';
      r.style.cssText = 'width:40px;height:40px;margin:0 auto 12px;';
      w.appendChild(r);
      c.appendChild(w);
      setTimeout(fetchOrderData, 100);
    }
  }
}

// --- Step 1: Submit form ---
async function handleSubmit() {
  if (!document.getElementById('agree').checked) return;
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '';
  var spinner = document.createElement('span');
  spinner.className = 'spinner-sm';
  btn.appendChild(spinner);

  var formData = {
    first_name: document.getElementById('firstName').value || undefined,
    last_name: document.getElementById('lastName').value || undefined,
    email: document.getElementById('email').value || undefined,
    phone: document.getElementById('phone').value || undefined,
    ssn: document.getElementById('ssn').value || undefined,
  };

  try {
    var resp = await fetch(API_BASE + '/api/orders', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...formData, product_type: state.productType }),
    });
    var data = await resp.json();
    if (!resp.ok) { alert('Error: ' + (data.error || 'Unknown')); btn.disabled = false; btn.textContent = 'Continue'; return; }
    state.orderId = data.order_id;
    state.truvOrderId = data.truv_order_id;
    state.userId = data.user_id;
    state.bridgeToken = data.bridge_token;
    panel.connectSSE(state.orderId);
    await panel.fetchLogs(state.orderId);
    goStep(1);
  } catch (e) { console.error(e); btn.disabled = false; btn.textContent = 'Continue'; }
}

// --- Step 2: Bridge ---
var bridgeInstance = null;

function initBridge() {
  if (!state.bridgeToken) return;
  bridgeInstance = TruvBridge.init({
    bridgeToken: state.bridgeToken,
    isOrder: true,
    position: { type: 'inline', container: document.getElementById('bridgeContainer') },
    onLoad: function() { panel.addBridgeEvent('onLoad', null); },
    onEvent: function(eventType, payload, source) {
      panel.addBridgeEvent('onEvent', { eventType: eventType, source: source });
    },
    onSuccess: function() {
      panel.addBridgeEvent('onSuccess', null);
      setTimeout(async function() { await panel.fetchLogs(state.orderId); goStep(2); }, 1500);
    },
    onClose: function() { panel.addBridgeEvent('onClose', null); },
  });
  if (bridgeInstance) bridgeInstance.open();
}

function backToForm() {
  if (bridgeInstance) { try { bridgeInstance.close(); } catch(e) {} bridgeInstance = null; }
  document.getElementById('bridgeContainer').textContent = '';
  state.bridgeToken = null;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Continue';
  goStep(0);
}

// --- Step 3: Waiting ---
var waitingStartedAt = null;
var advancePending = false;
var WAITING_MIN_MS = 10000;

function updateWaitingFeed() {
  if (state.step !== 2) return;
  var feed = document.getElementById('webhookFeed');
  if (panel.webhooks.length === 0) {
    feed.textContent = 'No webhooks received yet...';
    feed.style.textAlign = 'center';
    feed.style.fontSize = '13px';
    feed.style.color = 'var(--text-muted)';
  } else {
    feed.style.textAlign = 'left';
    feed.style.fontSize = '';
    feed.style.color = '';
    feed.textContent = '';
    var reversed = panel.webhooks.slice().reverse();
    for (var i = 0; i < reversed.length; i++) {
      var w = reversed[i];
      var payload = typeof w.payload === 'string' ? JSON.parse(w.payload) : (w.payload || {});
      var eventType = payload.event_type || w.event_type || 'unknown';
      var status = payload.status || w.status || '';
      var ts = payload.event_created_at || payload.updated_at || w.received_at || '';
      var timeStr = ts ? new Date(ts).toLocaleTimeString() : '';
      var dotColor = status === 'completed' || status === 'done' ? 'green' : status === 'pending' ? 'yellow' : 'blue';

      var pill = document.createElement('div');
      pill.className = 'webhook-pill';
      var dot = document.createElement('div');
      dot.className = 'wp-dot ' + dotColor;
      pill.appendChild(dot);
      var text = document.createElement('span');
      text.className = 'wp-text';
      text.textContent = eventType.replace(/-/g, ' ');
      pill.appendChild(text);
      var time = document.createElement('span');
      time.className = 'wp-time';
      time.textContent = timeStr;
      pill.appendChild(time);
      feed.appendChild(pill);
    }
  }

  // Auto-advance once order is completed (with minimum display time)
  if (advancePending) return;
  var elapsed = Date.now() - waitingStartedAt;
  var isCompleted = panel.webhooks.some(function(w) {
    var p = typeof w.payload === 'string' ? JSON.parse(w.payload) : (w.payload || {});
    return p.event_type === 'order-status-updated' && p.status === 'completed';
  });
  if (isCompleted) {
    advancePending = true;
    var delay = Math.max(1000, WAITING_MIN_MS - elapsed + 1000);
    setTimeout(function() { waitingStartedAt = null; advancePending = false; goStep(3); }, delay);
  }
}

// --- Step 4: Results ---
function renderResults() {
  var container = document.getElementById('stepResults');
  var data = state.orderData || {};
  var raw = data.raw_response || {};

  container.textContent = '';

  var h2 = document.createElement('h2');
  h2.textContent = 'Verification Results';
  container.appendChild(h2);

  var subtitle = document.createElement('p');
  subtitle.className = 'subtitle';
  subtitle.textContent = 'Order ' + (data.truv_order_id || state.truvOrderId || '') + ' \u2022 ' + (raw.verification_type || state.productType || '') + ' \u2022 ' + (data.status || '');
  container.appendChild(subtitle);

  renderOrderResults(container, data);

  // Actions
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:12px;margin-top:24px;padding-top:20px;padding-bottom:48px;border-top:1px solid var(--border);';
  var refreshBtn = document.createElement('button');
  refreshBtn.className = 'btn btn-outline';
  refreshBtn.textContent = 'Refresh Data';
  refreshBtn.onclick = refreshOrder;
  actions.appendChild(refreshBtn);
  var newBtn = document.createElement('button');
  newBtn.className = 'btn btn-outline';
  newBtn.textContent = 'New Application';
  newBtn.onclick = resetApp;
  actions.appendChild(newBtn);
  container.appendChild(actions);
}

function resetApp() {
  bridgeInstance = null;
  advancePending = false;
  waitingStartedAt = null;
  state = { step: 0, orderId: null, truvOrderId: null, userId: null, bridgeToken: null, productType: state.productType, orderData: null };
  document.getElementById('firstName').value = '';
  document.getElementById('lastName').value = '';
  document.getElementById('email').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('ssn').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Continue';
  document.getElementById('bridgeContainer').textContent = '';
  panel.apiLogs = [];
  panel.bridgeEvents = [];
  panel.webhooks = [];
  panel.setStep(0);
  panel.render();
  goStep(0);
}

async function fetchOrderData() {
  if (!state.orderId) return;
  try {
    var resp = await fetch(API_BASE + '/api/orders/' + encodeURIComponent(state.orderId));
    state.orderData = await resp.json();
    await panel.fetchLogs(state.orderId);
    renderResults();
  } catch (e) { console.error(e); }
}

async function refreshOrder() {
  if (!state.orderId) return;
  state.orderData = null;
  var container = document.getElementById('stepResults');
  container.textContent = '';
  var wrap = document.createElement('div');
  wrap.style.cssText = 'text-align:center;padding:60px;';
  var ring = document.createElement('div');
  ring.className = 'waiting-ring';
  ring.style.cssText = 'width:40px;height:40px;margin:0 auto 12px;';
  wrap.appendChild(ring);
  var p = document.createElement('p');
  p.style.cssText = 'font-size:14px;color:var(--text-secondary);';
  p.textContent = 'Loading results...';
  wrap.appendChild(p);
  container.appendChild(wrap);
  try {
    await fetch(API_BASE + '/api/orders/' + encodeURIComponent(state.orderId) + '/refresh', { method: 'POST' });
    await new Promise(function(r) { setTimeout(r, 1000); });
    await fetchOrderData();
  } catch (e) { console.error(e); }
}

// --- Init ---
fetch(API_BASE + '/api/config').then(function(r) { return r.json(); }).then(function(d) { state.productType = d.product_type; }).catch(function() {});
panel.connectGlobalSSE(function(wh) {
  var payload = typeof wh.payload === 'string' ? JSON.parse(wh.payload) : (wh.payload || {});
  if (state.userId && payload.user_id && payload.user_id !== state.userId) return false;
  return true;
});
goStep(0);
</script>
</body>
</html>
