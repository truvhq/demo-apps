<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truv Quickstart — Employee Portal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/shared/styles.css" />
  <style>
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .order-table { width: 100%; border-collapse: collapse; }
    .order-table th { text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .order-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
    .order-table tr:hover { background: var(--bg-input); cursor: pointer; }
    .badge-source { background: var(--bg-input); color: var(--text-secondary); font-size: 10px; }
    .share-url-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .share-url-box input { flex: 1; border: none; background: transparent; font-size: 13px; font-family: monospace; outline: none; color: var(--text); }
    .share-url-box .copy-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .screen-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .screen-card .desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo"></div>
    <div class="header-title">Truv Quickstart</div>
    <div class="header-badge">Employee Portal</div>
  </div>
</div>

<div class="main-layout">
  <div class="app-panel" id="appPanel"></div>
  <div id="apiPanel" class="api-panel"></div>
</div>

<script src="/shared/panel.js"></script>
<script>
var panel = new QuickstartPanel({
  tabs: ['api', 'webhooks'],
  onWebhook: function(wh) {},
  onApiCall: function(log) {}
});

var state = {
  screen: 'dashboard',
  orders: [],
  selectedOrder: null,
  orderData: null,
  formData: {},
  productType: 'income',
};

function render() {
  var appPanel = document.getElementById('appPanel');
  appPanel.replaceChildren();
  var sc = el('div', { className: 'screen-container' });

  if (state.screen === 'dashboard') sc.appendChild(buildDashboard());
  else if (state.screen === 'create') sc.appendChild(buildCreateForm());
  else sc.appendChild(buildDetailView());

  appPanel.appendChild(sc);
}

// --- Dashboard ---
function buildDashboard() {
  var card = el('div', { className: 'screen-card' });
  card.appendChild(el('div', { className: 'toolbar' }, [
    el('h2', {}, 'All Applications'),
    el('button', { className: 'btn btn-primary', onclick: function() { state.screen = 'create'; render(); } }, 'Create Order'),
  ]));
  card.appendChild(el('p', { className: 'desc' }, 'Admin dashboard showing all orders across the system.'));

  if (state.orders.length === 0) {
    card.appendChild(el('div', { className: 'empty-state' }, 'No orders yet. Create one or run another quickstart app first.'));
    return card;
  }

  var table = el('table', { className: 'order-table' });
  var thead = el('thead');
  thead.appendChild(el('tr', {}, [
    el('th', {}, 'Order ID'),
    el('th', {}, 'Source'),
    el('th', {}, 'Status'),
    el('th', {}, 'Created'),
  ]));
  table.appendChild(thead);

  var tbody = el('tbody');
  state.orders.forEach(function(order) {
    var statusClass = order.status === 'completed' ? 'badge-success' : (order.status === 'error' ? 'badge-error' : 'badge-pending');
    var dateStr = order.created_at ? new Date(order.created_at + 'Z').toLocaleString() : '-';
    tbody.appendChild(el('tr', { onclick: function() { viewOrder(order.order_id); } }, [
      el('td', { style: 'font-family:monospace;font-size:12px;' }, order.order_id),
      el('td', {}, el('span', { className: 'badge badge-source' }, order.demo_id || '-')),
      el('td', {}, el('span', { className: 'badge ' + statusClass }, order.status || '-')),
      el('td', { style: 'color:var(--text-muted);font-size:12px;' }, dateStr),
    ]));
  });
  table.appendChild(tbody);
  card.appendChild(table);
  return card;
}

function loadOrders() {
  fetch(API_BASE + '/api/orders')
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      state.orders = data;
      render();
    })
    .catch(function(e) { console.error(e); });
}

function viewOrder(orderId) {
  state.selectedOrder = orderId;
  state.orderData = null;
  state.screen = 'detail';
  render();

  fetch(API_BASE + '/api/orders/' + encodeURIComponent(orderId))
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      state.orderData = data;
      panel.connectSSE(orderId);
      panel.fetchLogs(orderId);
      render();
    })
    .catch(function(e) { console.error(e); });
}

// --- Create Form ---
function buildCreateForm() {
  var card = el('div', { className: 'screen-card' });
  card.appendChild(el('div', { className: 'back-link', onclick: function() { state.screen = 'dashboard'; render(); } }, [
    el('span', {}, '\u2190'), el('span', {}, 'Back to dashboard'),
  ]));
  card.appendChild(el('h2', {}, 'Create New Order'));
  card.appendChild(el('p', { className: 'desc' }, 'Enter applicant details. Email and phone are recommended for hosted order flow.'));

  card.appendChild(el('div', { className: 'form-row' }, [
    el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'First name'), el('input', { className: 'form-input', id: 'firstName', placeholder: 'John' })]),
    el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'Last name'), el('input', { className: 'form-input', id: 'lastName', placeholder: 'Johnson' })]),
  ]));
  card.appendChild(el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'Email'), el('input', { className: 'form-input', id: 'email', type: 'email', placeholder: 'j.johnson@example.com' })]));
  card.appendChild(el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'Phone'), el('input', { className: 'form-input', id: 'phone', type: 'tel', placeholder: '+15551234567' })]));

  var select = el('select', { className: 'form-input', id: 'productSelect' });
  [['employment','Employment'],['income','Income'],['deposit_switch','Direct Deposit Switch'],['pll','Paycheck Linked Loan']].forEach(function(pair) {
    select.appendChild(el('option', { value: pair[0] }, pair[1]));
  });

  card.appendChild(el('div', { className: 'form-row' }, [
    el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'SSN'), el('input', { className: 'form-input', id: 'ssn', placeholder: '991-91-9991' })]),
    el('div', { className: 'form-group' }, [el('label', { className: 'form-label' }, 'Product'), select]),
  ]));

  card.appendChild(el('button', { className: 'btn btn-primary', id: 'createBtn', style: 'width:100%;', onclick: handleCreate }, 'Create Order'));
  return card;
}

function handleCreate() {
  var btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'Creating...';

  var body = {
    first_name: document.getElementById('firstName').value || undefined,
    last_name: document.getElementById('lastName').value || undefined,
    email: document.getElementById('email').value || undefined,
    phone: document.getElementById('phone').value || undefined,
    ssn: document.getElementById('ssn').value || undefined,
    product_type: document.getElementById('productSelect').value,
  };

  fetch(API_BASE + '/api/orders', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  })
    .then(function(resp) {
      return resp.json().then(function(data) {
        if (!resp.ok) { alert('Error: ' + (data.error || 'Unknown')); btn.disabled = false; btn.textContent = 'Create Order'; return; }
        viewOrder(data.order_id);
      });
    })
    .catch(function(e) { console.error(e); btn.disabled = false; btn.textContent = 'Create Order'; });
}

// --- Detail View ---
function buildDetailView() {
  var card = el('div', { className: 'screen-card' });
  card.appendChild(el('div', { className: 'back-link', onclick: function() { state.screen = 'dashboard'; loadOrders(); } }, [
    el('span', {}, '\u2190'), el('span', {}, 'Back to dashboard'),
  ]));

  if (!state.orderData) {
    card.appendChild(el('div', { style: 'text-align:center;padding:48px;' }, [el('div', { className: 'spinner' }), el('p', {}, 'Loading order...')]));
    return card;
  }

  var data = state.orderData;
  var raw = data.raw_response || {};
  card.appendChild(el('h2', {}, 'Order Detail'));

  var table = el('div', { className: 'review-table' });
  addRow(table, 'Order ID', data.order_id || '-');
  addRow(table, 'Truv Order ID', data.truv_order_id || '-');

  var statusClass = data.status === 'completed' ? 'badge-success' : 'badge-pending';
  table.appendChild(el('div', { className: 'review-row' }, [
    el('span', { className: 'review-label' }, 'Status'),
    el('span', { className: 'review-value' }, el('span', { className: 'badge ' + statusClass }, data.status || '-')),
  ]));

  if (data.share_url) {
    var urlInput = el('input', { type: 'text', value: data.share_url, readOnly: true });
    var copyBtn = el('button', { className: 'copy-btn', onclick: function() {
      navigator.clipboard.writeText(urlInput.value);
      copyBtn.textContent = 'Copied!';
      setTimeout(function() { copyBtn.textContent = 'Copy'; }, 2000);
    } }, 'Copy');
    card.appendChild(table);
    card.appendChild(el('div', { style: 'margin-top:16px;' }, [
      el('label', { className: 'form-label' }, 'Share URL'),
      el('div', { className: 'share-url-box' }, [urlInput, copyBtn]),
    ]));
  } else {
    card.appendChild(table);
  }

  // Employment results
  if (raw.results) {
    var resultsSection = el('div', { style: 'margin-top:24px;padding-top:16px;border-top:1px solid var(--border-light);' });
    resultsSection.appendChild(el('h3', { style: 'font-size:16px;font-weight:600;margin-bottom:12px;' }, 'Results'));
    for (var ri = 0; ri < raw.results.length; ri++) {
      var r = raw.results[ri];
      var employments = r.employments || [];
      for (var ei = 0; ei < employments.length; ei++) {
        var emp = employments[ei];
        var empTable = el('div', { className: 'review-table' });
        addRow(empTable, 'Employer', emp.company && emp.company.name ? emp.company.name : '-');
        addRow(empTable, 'Job Title', emp.job_title || '-');
        addRow(empTable, 'Status', emp.is_active ? 'Active' : 'Inactive');
        addRow(empTable, 'Start Date', emp.start_date || '-');
        if (emp.income) addRow(empTable, 'Income', '$' + Number(emp.income).toLocaleString());
        resultsSection.appendChild(empTable);
      }
    }
    card.appendChild(resultsSection);
  }

  return card;
}

function addRow(table, label, value) {
  table.appendChild(el('div', { className: 'review-row' }, [el('span', { className: 'review-label' }, label), el('span', { className: 'review-value' }, String(value))]));
}

// --- Init ---
fetch(API_BASE + '/api/config')
  .then(function(r) { return r.json(); })
  .then(function(d) { state.productType = d.product_type; render(); })
  .catch(function() {});
loadOrders();
</script>
</body>
</html>
